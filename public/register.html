<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="apple-touch-icon" href="/icon_large_transparent.png" />
  <title>Register | Soup</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">
      <div class="auth-logo">Soup</div>
      <h1>Create Account</h1>
      <p class="auth-sub">Join Soup to create and deploy intelligent platform agents.</p>

      <div id="google-signin-btn" style="display:flex;justify-content:center;margin-bottom:8px;"></div>

      <div class="auth-divider"><span>or</span></div>

      <div class="auth-form">
        <div>
          <label for="name">Display Name</label>
          <input id="name" placeholder="Your name" autocomplete="name" />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Min 8 characters" autocomplete="new-password" />
        </div>
        <div id="register-error" class="auth-error"></div>
        <div id="register-success" class="auth-success"></div>
        <button class="btn btn-primary btn-block" id="registerBtn">Create Account</button>
      </div>
      <div class="auth-link">
        Already have an account? <a href="/login">Sign In</a>
      </div>
      <div class="auth-link" style="margin-top:6px;">
        <a href="/">← Back to Home</a>
      </div>
    </div>
  </div>
  <script src="/register.js" type="module"></script>
</body>
</html>
