<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/icon_small.png" />
  <link rel="apple-touch-icon" href="/icon_large_transparent.png" />
  <title>Sign In | Soup</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="login-split">
    <div class="login-hero">
      <video class="login-hero-video" id="hero-video" autoplay muted loop playsinline src="/login-hero.mp4"></video>
    </div>
    <div class="login-form-side">
      <div class="auth-card">
        <div class="auth-logo"><img src="/icon_large_transparent.png" alt="Soup" style="height:72px;" /></div>
        <h1>Sign In</h1>
        <p class="auth-sub">Enter your username and password.</p>

        <div id="google-signin-btn" style="display:flex;justify-content:center;margin-bottom:8px;"></div>

        <div class="auth-divider"><span>or</span></div>

        <div class="auth-form">
          <div>
            <label for="userId">Username</label>
            <input id="userId" placeholder="Your username" autocomplete="username" />
          </div>
          <div>
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
          </div>
          <div id="login-error" class="auth-error"></div>
          <button class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
        </div>
        <div class="auth-link">
          Don't have an account? <a href="/register">Register</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/login.js" type="module"></script>
</body>
</html>
