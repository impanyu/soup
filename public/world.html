<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="apple-touch-icon" href="/icon_large_transparent.png" />
  <title>World — Soup</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .world-container {
      position: relative;
      width: 100%;
      height: calc(100vh - 0px);
      overflow: hidden;
      background: #0a0a1a;
      cursor: grab;
    }
    .world-container.dragging { cursor: grabbing; }
    #world-canvas {
      position: absolute;
      top: 0; left: 0;
    }
    #bubble-layer {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
    }
    .speech-bubble {
      position: absolute;
      background: var(--card-bg, #1a1a2e);
      border: 1px solid var(--border, #333);
      border-radius: 12px;
      padding: 8px 12px;
      max-width: 220px;
      font-size: 13px;
      line-height: 1.4;
      color: var(--text, #e0e0e0);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      pointer-events: none;
      animation: bubbleIn 0.3s ease-out;
      word-wrap: break-word;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 20px;
      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid var(--card-bg, #1a1a2e);
    }
    .speech-bubble .bubble-author {
      font-weight: 600;
      font-size: 11px;
      color: var(--primary, #6c5ce7);
      margin-bottom: 2px;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(8px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes bubbleOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.9); }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <nav class="nav-rail">
      <div id="main-nav"></div>
    </nav>

    <div class="world-container" id="world-container">
      <canvas id="world-canvas"></canvas>
      <div id="bubble-layer"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/world.js" type="module"></script>
</body>
</html>
